# =============================================================================
# ILLUSTRATIVE / REFERENCE PIPELINE — not active in this showcase repository.
# -----------------------------------------------------------------------------
# This workflow documents, in principle, how the churn service is meant to be
# built and shipped on the company's On-Prem infrastructure (see ARCHITECTURE.md
# 3 "Tooling" and 4 "Deployment"). It targets **self-hosted runners** inside
# the data centre, an **internal container registry**, an **MLflow model
# registry**, and a **Kubernetes** cluster — none of which exist in this public
# showcase repo.
#
# To keep it from queuing against runners that aren't here, it is wired to run
# only on a manual `workflow_dispatch`. The real On-Prem trigger (push / PR to
# main) is shown commented below. Enable it — and provide the repo
# vars/secrets referenced throughout — once the infrastructure is provisioned.
# =============================================================================
name: CI/CD (reference — On-Prem)

on:
  # Manual trigger only, so this illustrative workflow never auto-runs here.
  workflow_dispatch:
  # --- Real On-Prem trigger (enable when self-hosted runners exist) ----------
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

env:
  REGISTRY: ${{ vars.INTERNAL_REGISTRY }}   # e.g. registry.internal.company:5000
  IMAGE_NAME: churn-api

jobs:
  # --- ARCHITECTURE.md , step 2: test gate (a red build never ships) --------
  lint:
    runs-on: [self-hosted, linux]
    container: python:3.11-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install ruff
      - run: ruff check src/ scripts/

  test:
    runs-on: [self-hosted, linux]
    container: python:3.11-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt
      # Includes test_train_serve_feature_parity — enforces the "one artefact,
      # no skew" principle (ARCHITECTURE.md 1.2) before anything is shipped.
      - run: pytest -q

  # --- ARCHITECTURE.md 4, steps 1 & 3: package the image ---------------------
  build:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      # Artefacts are NOT in Git — they live in the MLflow registry / MinIO.
      # Pull the current Production model into ./artifacts so the image can bake
      # it in (ARCHITECTURE.md 4, step 1). The Dockerfile guards on model.pkl,
      # so a failed/empty fetch fails the build instead of shipping an empty image.
      - name: Fetch Production model from registry
        env:
          MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
          MLFLOW_S3_ENDPOINT_URL: ${{ vars.MINIO_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          pip install --no-cache-dir mlflow
          mlflow artifacts download \
            --artifact-uri "models:/${IMAGE_NAME}/Production" \
            --dst-path artifacts/
          test -f artifacts/model.pkl \
            || { echo "::error::model.pkl not found after registry download"; exit 1; }

      - uses: docker/setup-buildx-action@v3
      - name: Log in to internal registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # --- ARCHITECTURE.md 4, step 4: ship + manual approval + k8s rollout --------
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux]
    # The "production" Environment carries required-reviewer protection rules,
    # i.e. a human must approve before this job runs (manual promotion gate).
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Roll out to Kubernetes
        run: |
          kubectl set image deployment/churn-api \
            churn-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n ml-serving
          kubectl rollout status deployment/churn-api -n ml-serving
